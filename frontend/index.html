<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - College Marketplace</title>

  <link rel="stylesheet" href="fieldproject.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

<section class="hero">
  <div class="hero-text">
    <h1>Welcome Back 👋</h1>

    <form id="loginForm">

      <input type="email" id="email" placeholder="Enter Email" required>

      <input type="password" id="password" placeholder="Enter Password" required>

      <select id="role">
        <option value="Buyer">Buyer</option>
        <option value="Seller">Seller</option>
      </select>

      <button type="submit" class="cta-btn">Login</button>
    </form>

    <p style="margin-top: 15px;">
      Don't have an account?
      <a href="sign.html" style="color:#ffcc70; font-weight:600;">
        Sign up
      </a>
    </p>
  </div>
</section>

<script>
  document.getElementById("loginForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
  
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;
  
    try {
      const res = await fetch("https://college-marketplace-4l3s.onrender.com/api/users/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password, role })
      });
  
      const data = await res.json();
      console.log("Response:", data); // 🔥 shows real error
  
      if (res.ok) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", role);
  
        window.location.href = role === "Buyer"
          ? "products.html"
          : "dashboard.html";
  
      } else {
        alert(data.error || "Login failed ❌");
      }
  
    } catch (err) {
      console.error("Login error:", err);
      alert("Error: " + err.message);
    }
  });
  </script>

</body>
</html>
