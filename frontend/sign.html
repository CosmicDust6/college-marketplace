<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="fieldproject.css">
<title>Signup</title>
</head>
<body>

<section class="hero">
<div class="hero-text">

<h1>Sign Up</h1>

<form id="signupForm">
<input id="name" placeholder="Name" required>
<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>
<input id="college" placeholder="College" required>

<select id="role">
<option>Buyer</option>
<option>Seller</option>
</select>

<button>Register</button>
</form>

</div>
</section>

<script>
  document.getElementById("signupForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
  
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
  
    try {
      const res = await fetch("https://college-marketplace-4l3s.onrender.com/api/users/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name,
          email,
          password,
          roll_no: null,      // ✅ IMPORTANT FIX
          college: null       // ✅ IMPORTANT FIX
        })
      });
  
      const data = await res.json();
      console.log("Signup response:", data);
  
      if (res.ok) {
        alert("Signup successful ✅");
        window.location.href = "login.html";
      } else {
        alert(data.error || "Signup failed ❌");
      }
  
    } catch (err) {
      console.error(err);
      alert("Error: " + err.message);
    }
  });
  </script>

</body>
</html>
